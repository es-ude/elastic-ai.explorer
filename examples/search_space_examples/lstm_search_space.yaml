input: [50, 1]
output: 1
sequence:
  - block: "1"
    op_candidates: [ "lstm" , "linear"]
    type_repeat:
      repeat_type: "repeat_op"
      depth: [1, 2]
    linear:
      activation:  "tanh"
      width: [ 16, 32 ]
    lstm:
      hidden_size:
        start: 10
        end: 50
        step: 10
      num_lstm_layers: 2
      bidirectional: [ False, True ]
      dropout:
        start: 0.2
        end: 0.5
        step: 0.1
  - block:  "2"
    op_candidates: "lstm"
    lstm:
      hidden_size: 5
      num_lstm_layers: 2
  - block: "3"
    op_candidates: ["linear"]
    activation: ["relu", "tanh"]
    type_repeat:
      repeat_type: "repeat_op"
      depth: 3
    linear:
      width: [30, 60]
    conv2d:
      kernel_size: [ 1, 2 ]
      stride: [ 1, 2 ]
      out_channels: [ 10, 4 ]