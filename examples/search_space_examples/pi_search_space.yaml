input: [1, 28, 28]
output: 10
sequence:
  - block: "1"
    op_candidates:  "conv2d"
    type_repeat:
      repeat_type: "repeat_op"
      depth: [1, 2]
    conv2d:
      kernel_size: 10
      stride: [ 1, 2 ]
      out_channels: [ 10, 4 ]
  - block:  "2"
    op_candidates:  "lstm"
    lstm:
      hidden_size: 1
      num_lstm_layers: 1
      bidirectional:  False
  - block: "3"
    op_candidates: "linear"
    type_repeat:
      repeat_type: "repeat_op"
      depth: 3
    linear:
      activation: ["relu", "tanh"]
      width: [30, 60]
