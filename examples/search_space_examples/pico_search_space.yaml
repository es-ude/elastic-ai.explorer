input: [1, 28, 28]
output: 10
quantization:
  quant_candidates: ["ptq_fully_quantized_int8", "full_precision"]
sequence:
  - block: "1"
    op_candidates: "linear"
    type_repeat:
      repeat_type: "repeat_op"
      depth: [ 1, 2 ]
    linear:
      activation: [ "sigmoid" , "relu"]
      width: [ 4, 5, 16 ]
  - block:  "2"
    op_candidates:  "lstm"
    type_repeat:
      repeat_type: "repeat_op"
      depth: [ 1, 2 ]
    lstm:
      hidden_size: 1
      num_lstm_layers: 1
      bidirectional: False
  - block: "2"
    op_candidates: "linear"
    type_repeat:
      repeat_type: "repeat_op"
      depth: 3
    linear:
      activation: ["relu", "tanh"]
      width: 10