input: [1, 28, 28]
output: 10
quantization:
  quant_candidates: ["full_precision"]
sequence:
  - block: "1"
    op_candidates: "conv-act-pool"
    type_repeat:
      type: "repeat_params"
      depth: [ 1, 3, 5, 7]
  - block:  "2"
    op_candidates:  "linear"
    type_repeat:
      type: "repeat_op"
      depth: [1, 2 ]
    linear:
      width: [32, 64, 128]
      activation: ["sigmoid", "identity"]

default_op_params:
  conv2d:
      kernel_size: [ 3, 4]
      stride: 1
      out_channels: [ 6, 16, 32, 64,  128 ]
      padding: [ 0, "same"]
  batch_norm:
  activation:
     op: "relu"

composites:
  conv-act-pool:
    sequence:
      - block: "conv_act_pool_1"
        op_candidates: "conv2d"
      - block: "conv_act_pool_2"
        op_candidates: "batch_norm"
      - block: "conv_act_pool_3"
        op_candidates: "activation"
      - block: "conv_act_pool_4"
        op_candidates: "maxpool"
        maxpool:
          kernel_size:  2